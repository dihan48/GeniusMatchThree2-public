<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Genius Match Three 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 50%, #0a0f1e 100%);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            padding: 10px;
            overflow: hidden;
            transition: background 0.5s ease;
        }
        body.light-theme {
            background: linear-gradient(145deg, #d0d8e8 0%, #c5d0e0 50%, #d0d8e8 100%);
        }
        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        /* Контейнер — flex-колонка, занимает всю высоту */
        .game-wrapper {
            width: 90vw;
            max-width: 420px;
            min-width: 280px;
            height: calc(100vh - 20px);
            max-height: calc(100vh - 20px);
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: box-shadow 0.3s ease, background 0.5s ease;
            display: flex;
            flex-direction: column;
        }
        body.light-theme .game-wrapper {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .game-wrapper:hover {
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.08), 0 0 60px rgba(66, 165, 245, 0.08);
        }
        /* Верхняя панель: очки и следующая фигура + кнопка паузы */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .score-area {
            background: linear-gradient(145deg, #03060ecc, #0a1020cc);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 6px 14px;
            text-align: left;
            border: 1px solid #2e4a6e;
            flex: 1;
            min-width: 0;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.3s ease;
        }
        .score-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(242, 201, 76, 0.05) 0%, transparent 70%);
            animation: scoreGlow 4s ease-in-out infinite;
        }
        @keyframes scoreGlow {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .score-area:hover {
            transform: translateY(-1px);
            border-color: #4a7a9e;
        }
        .score-area h3 {
            margin: 0;
            font-size: 0.7rem;
            color: #9bb8e0;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 1;
        }
        #scoreValue {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f2c94c 0%, #ffb347 50%, #f2c94c 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            text-shadow: none;
            line-height: 1.1;
            font-family: 'Orbitron', monospace;
            position: relative;
            z-index: 1;
            transition: transform 0.15s ease;
        }
        body.light-theme #scoreValue {
            background: linear-gradient(135deg, #b8860b 0%, #a07000 50%, #b8860b 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        #scoreValue.bump {
            animation: bump 0.2s ease;
        }
        @keyframes bump {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .high-score {
            font-size: 0.65rem;
            color: #7a9ab8;
            margin-top: 2px;
            position: relative;
            z-index: 1;
        }
        .high-score span {
            color: #c0a050;
            font-weight: bold;
        }
        .next-area {
            background: linear-gradient(145deg, #080c18cc, #0f1525cc);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid #2e5a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }
        .next-area:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(46, 90, 122, 0.3);
        }
        #nextCanvas {
            background-color: #0a1020;
            border-radius: 8px;
            border: none;
            display: block;
            image-render: -webkit-optimize-contrast;
            image-render: crisp-edges;
            transition: background-color 0.5s ease;
        }
        body.light-theme #nextCanvas {
            background-color: #d0d8e8;
        }
        .pause-btn {
            background: linear-gradient(145deg, #2a3f5e, #1f3050);
            border: none;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 0 #0f1a24, 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            line-height: 1;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pause-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .pause-btn:hover::before {
            left: 100%;
        }
        .pause-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #0f1a24, 0 10px 25px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #3a5070, #2a4060);
        }
        .pause-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f1a24, 0 3px 10px rgba(0,0,0,0.3);
        }
        /* Игровое поле — занимает всё доступное пространство */
        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            border-radius: 20px;
        }
        #boardCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #101624;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 3px solid #2e3b4e;
            cursor: pointer;
            image-render: -webkit-optimize-contrast;
            image-render: crisp-edges;
            position: relative;
            z-index: 1;
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }
        body.light-theme #boardCanvas {
            background-color: #e8ecf4;
            border-color: #a0b0c8;
        }
        /* Меню паузы (поверх поля) */
        .pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s ease, opacity 0.3s ease;
            overflow-y: auto;
            padding: 20px 0;
        }
        .pause-menu.active {
            visibility: visible;
            opacity: 1;
        }
        .menu-card {
            background: linear-gradient(145deg, #0f1422e6, #151c2ce6);
            border-radius: 48px;
            padding: 30px 40px;
            text-align: center;
            border: 1px solid #5f8aae;
            max-width: 420px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 80px rgba(66, 165, 245, 0.1);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: auto 0;
        }
        .pause-menu.active .menu-card {
            transform: scale(1) translateY(0);
        }
        .menu-card h2 {
            color: #ffdd99;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 221, 153, 0.3);
        }
        .pause-stats {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px 20px;
            margin: 15px 0;
            border: 1px solid #2a3a50;
        }
        .pause-stats p {
            margin: 6px 0;
            color: #9bb8e0;
            font-size: 0.9rem;
        }
        .pause-stats p span {
            color: #f2c94c;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
        }
        .theme-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }
        .pause-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 8px 16px;
            margin: 10px 0;
        }
        .pause-option-label {
            color: #9bb8e0;
            font-size: 0.9rem;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #2a3a50;
            border-radius: 24px;
            transition: 0.3s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: #4c7a5e;
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }
        .resume-btn {
            background: linear-gradient(145deg, #4c7a5e, #3a6a4e);
            font-size: 1.1rem;
            padding: 10px 22px;
            box-shadow: 0 4px 0 #2a4a3a, 0 6px 15px rgba(0,0,0,0.3);
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }
        .resume-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .resume-btn:hover::before {
            left: 100%;
        }
        .resume-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2a4a3a, 0 10px 25px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #5c8a6e, #4a7a5e);
        }
        .resume-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2a4a3a;
        }
        .restart-btn {
            background: linear-gradient(145deg, #7a5a4c, #6a4a3c);
            box-shadow: 0 4px 0 #4a3a2c, 0 6px 15px rgba(0,0,0,0.3);
            border: none;
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }
        .restart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .restart-btn:hover::before {
            left: 100%;
        }
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4a3a2c, 0 10px 25px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #8a6a5c, #7a5a4c);
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #4a3a2c;
        }
        /* Game Over оверлей */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 500;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .game-over-overlay.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }
        .game-over-card {
            background: linear-gradient(145deg, #1a0a0aee, #1e1018ee);
            border-radius: 48px;
            padding: 30px 40px;
            text-align: center;
            border: 1px solid #8a4a4a;
            max-width: 380px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 80px rgba(255, 80, 80, 0.15);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .game-over-overlay.active .game-over-card {
            transform: scale(1) translateY(0);
        }
        .game-over-card h2 {
            color: #ff8866;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 136, 102, 0.3);
        }
        .game-over-stats {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px 20px;
            margin: 15px 0;
            border: 1px solid #3a2020;
        }
        .game-over-stats p {
            margin: 6px 0;
            color: #c0a0a0;
            font-size: 0.9rem;
        }
        .game-over-stats p span {
            color: #f2c94c;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
        }
        .go-restart-btn {
            background: linear-gradient(145deg, #7a5a4c, #6a4a3c);
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 15px;
            box-shadow: 0 4px 0 #4a3a2c, 0 6px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .go-restart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .go-restart-btn:hover::before {
            left: 100%;
        }
        .go-restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4a3a2c, 0 10px 25px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #8a6a5c, #7a5a4c);
        }
        .go-restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #4a3a2c;
        }
        .controls-tip {
            font-size: 12px;
            color: #aaa;
            margin-top: 12px;
            flex-shrink: 0;
        }
        /* Стилизованные клавиши */
        .keys-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .key-cap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1a2030, #151a28);
            border: 1px solid #2a3a50;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.75rem;
            color: #8ab4d8;
            font-family: 'Orbitron', monospace;
            box-shadow: 0 2px 0 #0a1018, 0 3px 8px rgba(0,0,0,0.3);
            min-width: 28px;
            min-height: 28px;
            text-align: center;
            transition: all 0.2s ease;
            line-height: 1;
        }
        .key-cap svg {
            display: block;
            width: 16px;
            height: 16px;
        }
        .key-cap:has(svg) {
            padding: 6px;
        }
        .key-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .key-separator {
            color: #3a4a60;
            margin: 0 4px;
        }
        /* Светлая тема — элементы UI */
        body.light-theme .score-area {
            background: linear-gradient(145deg, rgba(200,210,230,0.9), rgba(220,228,242,0.9));
            border-color: #a0b0c8;
        }
        body.light-theme .score-area h3 {
            color: #4a5a70;
        }
        body.light-theme .high-score {
            color: #6a7a90;
        }
        body.light-theme .next-area {
            background: linear-gradient(145deg, rgba(200,210,230,0.9), rgba(220,228,242,0.9));
            border-color: #a0b0c8;
        }
        body.light-theme .pause-btn {
            background: linear-gradient(145deg, #5a7a9e, #4a6a8e);
            box-shadow: 0 3px 0 #3a5a7e, 0 4px 10px rgba(0,0,0,0.15);
        }
        body.light-theme .pause-btn:hover {
            background: linear-gradient(145deg, #6a8aae, #5a7a9e);
            box-shadow: 0 6px 0 #3a5a7e, 0 10px 25px rgba(0,0,0,0.2);
        }
        body.light-theme .pause-btn:active {
            box-shadow: 0 2px 0 #3a5a7e, 0 3px 10px rgba(0,0,0,0.15);
        }
        body.light-theme .pause-menu {
            background: rgba(200, 210, 225, 0.85);
        }
        body.light-theme .menu-card {
            background: linear-gradient(145deg, #e8ecf4, #dce2ee);
            border-color: #a0b0c8;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 0 80px rgba(66, 165, 245, 0.05);
        }
        body.light-theme .menu-card h2 {
            color: #2a3a50;
        }
        body.light-theme .pause-stats {
            background: rgba(0, 0, 0, 0.06);
            border-color: #c0c8d8;
        }
        body.light-theme .pause-stats p {
            color: #4a5a70;
        }
        body.light-theme .pause-stats p span {
            color: #b8900a;
        }
        body.light-theme .pause-option {
            background: rgba(0,0,0,0.06);
        }
        body.light-theme .pause-option-label {
            color: #4a5a70;
        }
        body.light-theme .toggle-slider {
            background: #b0b8c8;
        }
        body.light-theme .game-over-card {
            background: linear-gradient(145deg, #e8ecf4, #dce2ee);
            border-color: #a0b0c8;
        }
        body.light-theme .game-over-stats {
            background: rgba(0,0,0,0.06);
            border-color: #c0c8d8;
        }
        body.light-theme .game-over-stats p {
            color: #4a5a70;
        }
        body.light-theme .game-over-stats p span {
            color: #b8900a;
        }
        body.light-theme .key-cap {
            background: linear-gradient(145deg, #d0d8e8, #c0c8d8);
            border-color: #a0b0c8;
            color: #4a5a70;
            box-shadow: 0 2px 0 #a0a8b8, 0 3px 8px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        body.light-theme .key-cap svg {
            display: block;
            width: 16px;
            height: 16px;
        }
        body.light-theme .key-cap:has(svg) {
            padding: 6px;
        }
        body.light-theme .key-separator {
            color: #a0b0c8;
        }
        body.light-theme .controls-tip {
            color: #6a7a90;
        }
        .color-count-btn {
            background: linear-gradient(145deg, #1f2a3e, #182030);
            border: 1px solid #2a3a50;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            color: #8ab4d8;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 0 #0a1018, 0 3px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .color-count-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 0 #0a1018, 0 5px 12px rgba(0,0,0,0.4);
            border-color: #3a5a70;
            color: #a0d0f0;
        }
        .color-count-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #0a1018;
        }
        .color-count-btn.active {
            background: linear-gradient(145deg, #3a5a7e, #2a4a6e);
            border-color: #5f8aae;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(136, 187, 255, 0.3), inset 0 0 8px rgba(255,255,255,0.05);
        }
        body.light-theme .color-count-btn {
            background: linear-gradient(145deg, #d0d8e8, #c0c8d8);
            border-color: #a0b0c8;
            color: #4a5a70;
            box-shadow: 0 2px 0 #a0a8b8, 0 3px 8px rgba(0,0,0,0.1);
        }
        body.light-theme .color-count-btn:hover {
            border-color: #8a9ab8;
            color: #2a3a50;
        }
        body.light-theme .color-count-btn.active {
            background: linear-gradient(145deg, #5a7a9e, #4a6a8e);
            border-color: #3a5a7e;
            color: white;
        }

        /* Диалог подтверждения смены цветов */
        .color-count-confirm-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .color-count-confirm-overlay.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }
        .color-count-confirm-card {
            background: linear-gradient(145deg, #0f1422e6, #151c2ce6);
            border-radius: 36px;
            padding: 28px 36px;
            text-align: center;
            border: 1px solid #5f8aae;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 80px rgba(66, 165, 245, 0.1);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .color-count-confirm-overlay.active .color-count-confirm-card {
            transform: scale(1) translateY(0);
        }
        .color-count-confirm-card h2 {
            color: #ffdd99;
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(255, 221, 153, 0.3);
        }
        .confirm-text {
            color: #9bb8e0;
            font-size: 1.05rem;
            margin: 0 0 8px 0;
            line-height: 1.5;
        }
        .confirm-text #colorCountTarget {
            color: #f2c94c;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
        }
        .confirm-warning {
            color: #e08060;
            font-size: 0.9rem;
            margin: 0 0 20px 0;
            font-weight: bold;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .confirm-cancel-btn, .confirm-ok-btn {
            border: none;
            border-radius: 32px;
            padding: 10px 24px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .confirm-cancel-btn {
            background: linear-gradient(145deg, #3a4a5e, #2a3a4e);
            box-shadow: 0 3px 0 #1a2a3e, 0 5px 12px rgba(0,0,0,0.3);
        }
        .confirm-cancel-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .confirm-cancel-btn:hover::before {
            left: 100%;
        }
        .confirm-cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #1a2a3e, 0 8px 20px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #4a5a6e, #3a4a5e);
        }
        .confirm-cancel-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a2a3e;
        }
        .confirm-ok-btn {
            background: linear-gradient(145deg, #7a5a3c, #6a4a2c);
            box-shadow: 0 3px 0 #4a3a1c, 0 5px 12px rgba(0,0,0,0.3);
        }
        .confirm-ok-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .confirm-ok-btn:hover::before {
            left: 100%;
        }
        .confirm-ok-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #4a3a1c, 0 8px 20px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #8a6a4c, #7a5a3c);
        }
        .confirm-ok-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #4a3a1c;
        }

            background: rgba(200, 210, 225, 0.85);
        }
        body.light-theme .color-count-confirm-card {
